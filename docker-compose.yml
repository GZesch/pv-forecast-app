services:
  backend:
    build:
      context: .
      target: backend
    environment:
      DATABASE_PATH: /app/database/pv_forecast.duckdb
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-pv-forecast-app/1.0}
      OPENMETEO_BASE_URL: ${OPENMETEO_BASE_URL:-https://api.open-meteo.com/v1/forecast}
      OPEN_METEO_CACHE_TTL_SECONDS: ${OPEN_METEO_CACHE_TTL_SECONDS:-21600}
    volumes:
      - ./database:/app/database
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - --no-sync
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    environment:
      API_BASE_URL: http://backend:8000
    expose:
      - "8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_SITE_URL: ${PREVIEW_SITE_ADDRESS:-http://preview.localhost}
        NEXT_PUBLIC_PV_FORECAST_URL: ${PV_FORECAST_URL:-http://localhost}
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      PREVIEW_SITE_ADDRESS: ${PREVIEW_SITE_ADDRESS:-http://preview.localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
